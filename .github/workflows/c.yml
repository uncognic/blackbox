name: Make build
on:
  push:
    branches: [ "main" ]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: sudo apt install g++-14 cmake
    - name: Build
      run: |
        cmake -B build
        cmake --build build
    - name: Check artifacts
      run: |
        for f in bbx bbxd bbxc; do
          test -f "build/$f" || { echo "Missing artifact: $f"; exit 1; }
        done
    - name: Delete old continuous release
      run: gh release delete continuous --yes --cleanup-tag || true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: continuous
        name: Continuous build
        body: |
          Built from ${{ github.sha }}
          ${{ github.event.head_commit.message }}
        files: |
          build/bbx
          build/bbxd
          build/bbxc